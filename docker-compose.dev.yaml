services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.debug
    container_name: go_app_dev
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      GREENLIGHT_DB_DSN: "postgres://user:pass@postgres/greenlight?sslmode=disable"
    ports:
      - "4000:4000"
      - "40000:40000"
    volumes:
      - .:/app

  postgres:
    image: postgres:16
    container_name: postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: greenlight
      POSTGRES_USER: user
      POSTGRES_PASSWORD: pass
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d greenlight"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  postgres_data: